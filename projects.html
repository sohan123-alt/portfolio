<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>All Projects · Portfolio</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<!-- Navbar -->
<nav class="navbar scrolled">
  <div class="container nav-inner">
    <a href="index.html" class="nav-brand"><span>&lt;</span>Dev<span>/&gt;</span></a>
    <ul class="nav-links" id="navLinks">
      <li><a href="index.html#home"     class="nav-link">Home</a></li>
      <li><a href="index.html#about"    class="nav-link">About</a></li>
      <li><a href="index.html#skills"   class="nav-link">Skills</a></li>
      <li><a href="index.html#projects" class="nav-link active">Projects</a></li>
      <li><a href="index.html#contact"  class="nav-link">Contact</a></li>
      <li><a href="login.html" class="btn btn-ghost btn-sm nav-cta">Admin</a></li>
    </ul>
    <button class="nav-toggle" id="navToggle" aria-label="Toggle navigation">
      <span></span><span></span><span></span>
    </button>
  </div>
</nav>

<!-- Page Header -->
<section style="padding-top:8rem;padding-bottom:3rem;background:var(--bg-2);border-bottom:1px solid var(--border);">
  <div class="container">
    <p class="section-label">Portfolio</p>
    <h1 class="section-title">All Projects</h1>
    <p class="section-desc">Every project I've built — click to explore details.</p>
  </div>
</section>

<!-- Projects Grid -->
<section>
  <div class="container">
    <!-- Search / Filter Bar -->
    <div style="margin-bottom:2rem;display:flex;gap:1rem;align-items:center;flex-wrap:wrap;">
      <input
        type="text"
        id="searchInput"
        class="form-control"
        placeholder="Search projects…"
        style="max-width:320px;"
      />
      <span id="projectsCount" style="color:var(--text-muted);font-size:0.88rem;"></span>
    </div>

    <div class="projects-grid" id="projectsGrid">
      <!-- Skeletons while loading -->
      <div class="project-card">
        <div class="project-img-placeholder" style="animation:glowPulse 1.5s infinite;background:var(--bg-2);"></div>
        <div class="project-body">
          <div style="height:18px;background:var(--bg-2);border-radius:4px;margin-bottom:0.6rem;animation:glowPulse 1.5s infinite;"></div>
          <div style="height:12px;background:var(--bg-2);border-radius:4px;width:70%;animation:glowPulse 1.5s infinite;"></div>
        </div>
      </div>
    </div>
  </div>
</section>

<!-- Footer -->
<footer class="footer">
  <div class="container">
    <p><a href="index.html">← Back to Home</a></p>
  </div>
</footer>

<script src="js/supabase.js"></script>
<script src="js/app.js"></script>
<script>
/* ── Mobile nav toggle ─────────────────────────────── */
document.getElementById('navToggle').addEventListener('click', () => {
  document.getElementById('navLinks').classList.toggle('open');
});

let allProjects = [];

/* ── Load all projects ─────────────────────────────── */
async function loadAllProjects() {
  const grid = document.getElementById('projectsGrid');
  const { data, error } = await fetchProjects();
  grid.innerHTML = '';

  if (error || !data?.length) {
    grid.innerHTML = `
      <div class="empty-state">
        <div class="empty-state-icon">🚀</div>
        <p>No projects yet. Check back soon!</p>
      </div>`;
    return;
  }

  allProjects = data;
  renderProjects(data);
}

function renderProjects(projects) {
  const grid = document.getElementById('projectsGrid');
  const count = document.getElementById('projectsCount');
  grid.innerHTML = '';
  count.textContent = `${projects.length} project${projects.length !== 1 ? 's' : ''}`;

  if (!projects.length) {
    grid.innerHTML = `
      <div class="empty-state">
        <div class="empty-state-icon">🔍</div>
        <p>No projects match your search.</p>
      </div>`;
    return;
  }

  projects.forEach(p => {
    const card = document.createElement('div');
    card.className = 'project-card reveal';
    const imgHtml = p.image_url
      ? `<img class="project-img" src="${p.image_url}" alt="${escHtml(p.title)}" loading="lazy"/>`
      : `<div class="project-img-placeholder">🖼️</div>`;
    card.innerHTML = `
      ${imgHtml}
      <div class="project-body">
        <h3 class="project-title">${escHtml(p.title)}</h3>
        <p class="project-desc" style="-webkit-line-clamp:unset;">${escHtml(p.description ?? '')}</p>
      </div>`;
    grid.appendChild(card);
  });

  initRevealAnimations();
}

/* ── Search filter ─────────────────────────────────── */
document.getElementById('searchInput').addEventListener('input', (e) => {
  const q = e.target.value.toLowerCase();
  const filtered = allProjects.filter(p =>
    p.title?.toLowerCase().includes(q) ||
    p.description?.toLowerCase().includes(q)
  );
  renderProjects(filtered);
});

function escHtml(str) {
  return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

loadAllProjects();
</script>
</body>
</html>
